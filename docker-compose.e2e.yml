services:
  postgres_e2e:
    image: postgres:16
    container_name: sis-postgres-e2e
    environment:
      POSTGRES_DB: sis
      POSTGRES_USER: sis
      POSTGRES_PASSWORD: sis
    ports:
      - "5433:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data

volumes:
  postgres_e2e_data:
